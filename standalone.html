        const JUNIOR_STORIES = [
            { id: 1, title: "Jax's Hat Heist", icon: '🐇', text: "Listen up, folks! Jax the sneaky rabbit has been up to his tricks again. He crept into the Big Top early this morning and found fifteen shiny red hats stacked near the entrance. He giggled to himself and quickly hid them all behind the big blue curtain at the back of the tent. 'No one will ever find them!' he laughed. But Pomni was watching from the shadows. She saw exactly what Jax did — and now she needs YOUR help! Read this story carefully. Can you spot all the color words hiding inside? Tap every color word you find to collect it. Jax thinks he is so clever. Let's prove him wrong and find every single clue!", targets: ['red', 'blue'] },
            { id: 2, title: "Pomni's Garden Mystery", icon: '🌿', text: "Step right up! Pomni discovered something strange in the circus garden today. A trail of bright green footprints led all the way from the tent entrance to the magic fountain. Along the path she spotted a shiny yellow ribbon tied around every single lamppost. 'Who left all these clues?' she wondered out loud. Kinger overheard her and ran over to help. Together they followed the trail — but the mystery was just getting started! Someone had been here before them and left a secret message behind. Can you help Pomni and Kinger decode the clues? Search the story carefully and tap every color word you find!", targets: ['green', 'yellow'] },
            { id: 3, title: "Kinger's Missing Crown", icon: '👑', text: "Ladies and gentlemen, we have an emergency! Kinger's beloved crown has gone missing from the royal tent. He was wearing it during rehearsal when he spotted a glowing orange lantern swinging outside the window. Distracted, he set the crown down for just one moment — when he looked back, it was gone! The only clue left behind was a smudge of purple paint on the floor near the door. 'Purple paint!' gasped Kinger. 'Only one performer uses purple paint!' Join Kinger on his detective adventure. Read the story carefully and tap every color word you find to reveal the hidden trail of clues!", targets: ['orange', 'purple'] },
            { id: 4, title: "Ragatha's Surprise Party", icon: '🎀', text: "Shh — it's a secret! Ragatha is planning a surprise party for the whole circus crew. She spent all morning decorating the tent with long pink streamers that danced in the breeze. Then she laid out a beautiful white tablecloth on the big round table in the center of the ring. 'Perfect!' she smiled to herself. She arranged cookies, cupcakes, and sparkly treats for everyone. But she still needs one more thing to make the party complete — and she needs YOUR help to find it! Read Ragatha's story very carefully and tap every color word you discover hiding inside the text. Can you find them all?", targets: ['pink', 'white'] },
            { id: 5, title: "Gangle's Ribbon Race", icon: '🎗️', text: "The annual ribbon race is here! Gangle dashed across the sawdust floor of the Big Top, her ribbons trailing behind her like shooting stars. She grabbed a bright red baton from the starting post and sprinted toward the far end of the tent. Sneaky Jax had tied a rope across the track to trip her — but Gangle leaped over it with grace! At the finish line stood a tall green trophy gleaming under the spotlight. The crowd went wild! But Jax tried to swap the trophies when no one was looking. Help Gangle win fair and square by finding all the color words hidden in the story. Tap every one you spot!", targets: ['red', 'green'] },
            { id: 6, title: "Bubble's Bath Time", icon: '🧼', text: "Bubble decided it was time for a bath! He filled a big blue tub with lots of soapy water. The bubbles were bright white and floated all around the room. Caine watched as Bubble splashed around, making a huge mess! 'Be careful!' Caine shouted, but Bubble was having too much fun. He even found a small yellow ducky hiding in the suds. Can you find the color words in Bubble's story? Tap them all!", targets: ['blue', 'white'] },
            { id: 7, title: "Caine's Magic Wand", icon: '🪄', text: "Caine wanted to show off his new magic trick. He held a long black wand in his hand and pointed it at a hat. Suddenly, a shower of gold sparks flew out! Everyone gasped in surprise. 'Watch this!' Caine said, and he turned a red rose into a blue butterfly. The circus was filled with magic and wonder. Can you spot the color words? Tap every one you find!", targets: ['black', 'gold'] },
            { id: 8, title: "Zooble's Part Swap", icon: '🧩', text: "Zooble was feeling a bit bored with her look. She decided to swap her purple arm for a bright orange one. 'Much better!' she said, looking in the mirror. Then she found a green leg and a yellow hat to complete her new outfit. Jax laughed when he saw her. 'You look like a rainbow!' he teased. Zooble didn't mind at all. Help Zooble find all the color words in her story!", targets: ['purple', 'orange'] },
            { id: 9, title: "The Circus Parade", icon: '🥁', text: "It was time for the grand circus parade! Ragatha led the way, waving a big red flag. Behind her, Kinger rode a giant yellow elephant that trumpeted loudly. The crowd cheered as they passed by. Gangle did flips in the air, her pink ribbons flying behind her. Even Jax joined in, wearing a silly green suit. It was the best parade ever! Can you find all the color words? Tap them now!", targets: ['red', 'yellow'] },

            { id: 11, title: "Jax's Prank Box", icon: '📦', text: "Jax found a mysterious green box sitting in the middle of the floor. He couldn't resist opening it! Inside, he found a bunch of brown spiders that jumped out at him. 'Yikes!' Jax yelled, jumping back. It was a prank from Bubble! Jax laughed and decided to hide the box behind a big blue curtain. 'I'll get him back later!' he whispered. Can you find the color words? Tap them all!", targets: ['green', 'brown'] },

            { id: 13, title: "Kinger's Chess Match", icon: '♟️', text: "Kinger was playing a serious game of chess. He moved a white pawn forward, thinking carefully about his next move. His opponent, a mysterious black shadow, moved a knight. Kinger scratched his head. 'This is a tough one!' he muttered. He looked at the red timer on the table. Only one minute left! Can you find the color words in Kinger's chess match? Tap them all!", targets: ['white', 'black'] },
            { id: 14, title: "Ragatha's Sewing Kit", icon: '🧵', text: "Ragatha was busy mending a hole in the tent. She used a long red thread to stitch the fabric together. Then she found a patch of blue cloth to cover the spot. 'Good as new!' she said, patting the tent. She put her needle back in her yellow pincushion and smiled. The circus was safe and sound. Can you spot the color words? Tap every one you find!", targets: ['red', 'blue'] },
            { id: 15, title: "Gangle's Mask Collection", icon: '🎭', text: "Gangle had a collection of many different masks. Today she chose a bright yellow one with a big smile. She also had a sad orange mask for when she was feeling blue. She carefully placed them on a purple shelf in her room. 'Which one should I wear tomorrow?' she wondered. Jax walked in and pointed at a green mask. 'That one!' he said. Can you find the color words? Tap them all!", targets: ['yellow', 'orange'] },
            { id: 16, title: "The Candy Cannon", icon: '🚀', text: "Caine brought out his most exciting invention yet: the Candy Cannon! He loaded it with pink marshmallows and green jellybeans. 'Ready, aim, fire!' he shouted. A shower of sweets exploded into the air, and everyone scrambled to catch them. It was a delicious surprise! Pomni found a blue lollipop on the ground. Can you find the color words in this sweet story?", targets: ['pink', 'green'] },
            { id: 17, title: "Caine's Floating Hat", icon: '🎩', text: "Caine's hat started to float all by itself! It was a tall purple hat with a white band around it. It drifted up toward the top of the tent, and Caine had to jump to catch it. 'Come back here!' he laughed. The hat did a loop-de-loop and landed right on Jax's head. Jax looked very silly! Can you spot the color words? Tap every one you find!", targets: ['purple', 'white'] },
            { id: 18, title: "Bubble's Soap Suds", icon: '🫧', text: "Bubble was blowing giant bubbles with a white wand. One bubble was so big it turned a shimmering blue color. It floated over the circus ring and popped right over Kinger's head! Kinger was covered in soap suds. 'Oh my!' he exclaimed. Bubble just giggled and blew another one. Can you find the color words in Bubble's story? Tap them now!", targets: ['white', 'blue'] },

        const SENIOR_STORIES = [
            { id: 101, title: "The Night the Wall Rose", icon: '🧱', text: "It happened while most of Berlin slept. On a gray August morning in 1961, Greta pressed her face against the cold window and watched soldiers unroll coils of wire across the street below. By dawn the wire stretched as far as she could see, splitting the city in two. Searchlights swept the empty boulevard like silent, accusing eyes. Her father was on the other side. Now guards in gray uniforms paced back and forth, their boots heavy on the cobblestones. She pressed both hands flat against the glass. Someday she would escape this divided city. Someday she and her father would both be free. That small, burning hope was the only thing she had left. Read every word of Greta's story. Tap every Threat word you find, then every Hope word — they are all hiding inside the text!", threats: ['soldiers', 'wire', 'guards'], hope: ['escape', 'free', 'hope'], question: { text: "Who were pacing back and forth outside Greta's window?", answer: "guards" } },
            { id: 102, title: "Beneath the Cobblestones", icon: '⛏️', text: "Three meters below the cobblestones of East Berlin, a group of students dug in silence. They called it the tunnel. Their hands were raw and bleeding. The clay walls of the tunnel pressed close on every side, and the air smelled of damp earth and fear. Each bucket of soil had to be carried back by hand — one mistake, and the Stasi would find them all. The Stasi used informants everywhere, even among neighbors and childhood friends. Above, a patrol marched back and forth along the border. Ahead in the darkness a tiny candle flickered: a signal from the western side that the coast was clear. One by one, twenty-nine people crawled through the tunnel toward the light. The last to emerge was a grandmother who wept with joy — she was finally free. Search every sentence. Tap every Threat word, then every Hope word!", threats: ['stasi', 'patrol', 'informants'], hope: ['tunnel', 'signal', 'free'], question: { text: "What did the students dig beneath the cobblestones?", answer: "tunnel" } },
            { id: 103, title: "The Man in the Green Coat", icon: '🕵️', text: "Every morning the man in the green coat stood at the corner pretending to read a newspaper. He was never actually reading. He was watching. The Stasi — the secret police of East Germany — kept files on nearly every family in the city. Anna knew about those files. Her family had learned to speak only in code, turning the radio up loud before whispering anything that mattered. Anna's mother had hidden forged papers beneath the floorboards, along with a secret map and a route that could lead to escape. One cold dawn the man in the green coat knocked on their door. Anna clutched the papers tightly, her heart hammering. Everything depended on the next few seconds. Search every sentence carefully. Tap every Threat word, then every Hope word!", threats: ['stasi', 'watching', 'files'], hope: ['secret', 'papers', 'escape'], question: { text: "Who kept files on every family in the city?", answer: "stasi" } },
            { id: 106, title: "The Secret Message", icon: '✉️', text: "Gerta found the drawing in the dirt near the construction site. It was a simple sketch of a building she recognized, but there was a mark on it that didn't belong. She knew it was a secret from her father. The Stasi were always watching, their eyes cold and unblinking. She had to be careful. If the guards caught her with the drawing, she would be arrested. But the sketch gave her hope. It was a sign that her father was still thinking of them, still planning for their escape. She tucked the paper into her boot and walked away, her heart racing. Tap every Threat word, then every Hope word!", threats: ['stasi', 'watching', 'guards'], hope: ['secret', 'hope', 'escape'], question: { text: "Where did Gerta hide the secret drawing?", answer: "boot" } },
            { id: 107, title: "The Air Raid Shelter", icon: '🏚️', text: "The old air raid shelter was damp and dark, but it was the perfect place to start. Gerta and Fritz began to dig. Every shovel of dirt felt like a step toward freedom. They had to be silent, for the border was only a few meters away. The sound of a patrol could mean the end of everything. They used a bucket to carry the soil to the back of the room, hiding it beneath old crates. The work was exhausting, but the thought of the tunnel kept them going. They were building a bridge to the West, one handful of earth at a time. Tap every Threat word, then every Hope word!", threats: ['border', 'patrol', 'hiding'], hope: ['freedom', 'tunnel', 'west'], question: { text: "What did Gerta and Fritz use to carry the soil?", answer: "bucket" } },
            { id: 108, title: "The Officer's Gaze", icon: '👮', text: "Officer Muller stood at the edge of the death strip, his binoculars fixed on the apartment building. He was part of the Stasi, the force that kept the city in a grip of fear. Gerta felt his gaze like a physical weight. She continued to plant her garden, pretending to be an ordinary girl with ordinary chores. Beneath the surface, the tunnel was growing. She knew that any mistake, any slip of the tongue, would lead to the interrogation rooms. But she also knew that Muller was human. Sometimes she saw a flicker of doubt in his eyes. Perhaps even a guard could dream of freedom. Tap every Threat word, then every Hope word!", threats: ['stasi', 'fear', 'interrogation'], hope: ['garden', 'tunnel', 'freedom'], question: { text: "What was Gerta pretending to plant to hide her work?", answer: "garden" } },
            { id: 109, title: "The Sound of the Drill", icon: '⚙️', text: "The sound of the drill was deafening in the small space. Fritz worked feverishly, trying to break through the final layer of rock. On the other side, they could hear the faint sound of music from the West. It was a signal that they were close. But the noise was a threat. If a neighbor heard the vibration, they might call the police. The Stasi rewarded those who turned in their friends. Gerta held her breath, listening for the sound of boots on the stairs. Suddenly, the drill broke through. A sliver of light appeared. It was the light of escape. Tap every Threat word, then every Hope word!", threats: ['police', 'stasi', 'vibration'], hope: ['signal', 'west', 'escape'], question: { text: "What did Fritz use to break through the rock?", answer: "drill" } },
            { id: 110, title: "The Final Dash", icon: '🏃', text: "The tunnel was collapsing. Dust filled Gerta's lungs as she crawled toward the opening. Behind her, she could hear the shouts of the guards. They had found the entrance. The searchlights cut through the night, searching for any sign of movement. 'Run!' Fritz yelled. They scrambled out of the hole and into the tall grass of the death strip. The wire fence was just ahead. With one final burst of energy, they leaped over the barrier and into the arms of their father. They were finally free. The wall could no longer divide them. Tap every Threat word, then every Hope word!", threats: ['guards', 'searchlights', 'wire'], hope: ['tunnel', 'free', 'father'], question: { text: "Who was waiting for them on the other side of the fence?", answer: "father" } },
            { id: 111, title: "The Secret Tunnel", icon: '🚇', text: "Deep in the basement of an old bakery, the secret work continued. The Stasi were patrolling the streets above, but they didn't know about the tunnel. Every inch of progress was a victory. The border was guarded by soldiers with dogs, but the hope of freedom kept the diggers strong. They worked in shifts, never stopping. One night, they heard the sound of water. They had hit a pipe! They had to be careful not to flood the tunnel. Tap every Threat word, then every Hope word!", threats: ['stasi', 'border', 'soldiers'], hope: ['secret', 'tunnel', 'freedom'], question: { text: "Where was the secret tunnel being dug?", answer: "bakery" } },
            { id: 112, title: "The Midnight Crossing", icon: '🌑', text: "The night was pitch black. The guards were changing shifts at the wall. This was the moment. Gerta and her family moved silently through the shadows. The searchlights were scanning the area, but they stayed low. They reached the wire fence and began to cut through. Every snip felt like a thunderclap. Suddenly, a dog barked! They froze. After a long minute, the dog went quiet. They finished the cut and scrambled through. They were free at last. Tap every Threat word, then every Hope word!", threats: ['guards', 'searchlights', 'wire'], hope: ['midnight', 'escape', 'free'], question: { text: "What did they have to cut through to escape?", answer: "fence" } },
            { id: 113, title: "The Hidden Radio", icon: '📻', text: "In the attic, hidden behind a false wall, was a small radio. It was their only connection to the West. The police were always looking for illegal radios, and informants were everywhere. They had to be very quiet. The signal was weak, but they could hear the news. It gave them hope that the world hadn't forgotten them. One day, the radio broadcast a secret message. It was time to move. Tap every Threat word, then every Hope word!", threats: ['police', 'informants', 'watching'], hope: ['radio', 'signal', 'secret'], question: { text: "Where was the illegal radio hidden?", answer: "attic" } },
            { id: 114, title: "The Wall's Shadow", icon: '👤', text: "The wall cast a long shadow over the city. Soldiers stood on the towers, watching everything. The wire was sharp and dangerous. Gerta looked out at the garden she had planted. It was a small patch of hope in a gray world. She knew that one day, the wall would fall. But for now, they had to be patient. They had to wait for the right moment to escape. Tap every Threat word, then every Hope word!", threats: ['soldiers', 'watching', 'wire'], hope: ['shadow', 'hope', 'garden'], question: { text: "What did Gerta plant to keep her hope alive?", answer: "garden" } },
            { id: 115, title: "The Forged Passport", icon: '🛂', text: "The papers were perfect. The Stasi had files on everyone, but they wouldn't find anything wrong with these. The passport was their ticket to freedom. They had to be careful at the checkpoint. The inspection would be thorough. Anna's heart was pounding as she handed over the forged papers. The guard looked at them for a long time. Finally, he stamped them and handed them back. They were one step closer to escape. Tap every Threat word, then every Hope word!", threats: ['stasi', 'files', 'inspection'], hope: ['passport', 'papers', 'escape'], question: { text: "What was forged to help them escape?", answer: "passport" } },
            { id: 116, title: "The Balloon Escape", icon: '🎈', text: "The balloon was ready. It was made of hundreds of pieces of fabric, sewn together in secret. The guards were patrolling the border, but they weren't looking up. The family climbed into the basket and lit the burner. The balloon rose slowly into the night sky. They floated over the wall and toward the West. It was a daring escape. Suddenly, the wind shifted. They were heading back toward the East! They had to act fast. Tap every Threat word, then every Hope word!", threats: ['guards', 'border', 'watching'], hope: ['balloon', 'west', 'escape'], question: { text: "What was the balloon made of?", answer: "fabric" } },
            { id: 117, title: "The Checkpoint", icon: '🚧', text: "The checkpoint was crowded. People were waiting in long lines for the inspection. The police were checking every bag and every pocket. Gerta tried to stay calm. She had a secret message hidden in her shoe. When it was her turn, she gave the guard a small smile. He looked at her papers and then at her. 'Move along,' he said. She walked through the gate and felt the first breath of freedom. Tap every Threat word, then every Hope word!", threats: ['checkpoint', 'inspection', 'police'], hope: ['smile', 'secret', 'freedom'], question: { text: "Where did Gerta hide the secret message?", answer: "shoe" } },
            { id: 118, title: "The Letter from the West", icon: '📬', text: "A letter arrived from the West. It was hidden inside a box of chocolates. The Stasi were always watching the mail, but they missed this one. The letter contained a secret map and a signal for the next crossing. It was the hope they had been waiting for. They read the letter over and over, memorizing every detail. Then they burned it. They couldn't leave any evidence behind. Tap every Threat word, then every Hope word!", threats: ['stasi', 'watching', 'files'], hope: ['letter', 'west', 'signal'], question: { text: "Where was the letter from the West hidden?", answer: "chocolates" } },
            { id: 119, title: "The Silent Protest", icon: '🕯️', text: "The people gathered in the square. They were silent, but their message was clear. The police were standing by, ready to move in. The fear was palpable, but so was the hope. They held candles that flickered in the wind. It was a peaceful protest for freedom. Suddenly, the lights went out. The square was plunged into darkness. But the candles kept burning. They were a sign that the people would not be silenced. Tap every Threat word, then every Hope word!", threats: ['police', 'fear', 'watching'], hope: ['protest', 'hope', 'freedom'], question: { text: "What did the people hold during the silent protest?", answer: "candles" } },
            { id: 120, title: "The Night of the Escape", icon: '🌃', text: "The night of the escape had finally arrived. The guards were distracted by a celebration in the city. The wire was unguarded for just a few minutes. They reached the tunnel and began to crawl. It was a long and difficult journey, but they were determined. They could hear the sound of the border patrol above them. They held their breath and kept moving. Finally, they reached the other side. They were free. Tap every Threat word, then every Hope word!", threats: ['guards', 'wire', 'patrol'], hope: ['escape', 'tunnel', 'free'], question: { text: "What were the guards distracted by?", answer: "celebration" } },
            { id: 121, title: "The Informant's Trap", icon: '🪤', text: "The informant had set a trap. He told the Stasi about the secret meeting. The police were waiting in the shadows. But Gerta had a feeling something was wrong. She saw a signal from a friend and realized it was a setup. She warned the others just in time. They escaped through a back door and into the night. It was a close call, but they were safe. Tap every Threat word, then every Hope word!", threats: ['informant', 'stasi', 'police'], hope: ['signal', 'secret', 'escape'], question: { text: "How did Gerta and her friends escape the trap?", answer: "door" } },
            { id: 122, title: "The Final Reunion", icon: '👨‍👩‍👧', text: "The wall was finally open. People were streaming across the border in both directions. The searchlights were no longer searching for escapees. Gerta stood at the checkpoint, looking for her father. Suddenly, she saw him. He was running toward her with a huge smile. They hugged each other tightly, tears of joy streaming down their faces. They were finally together, and they were finally free. Tap every Threat word, then every Hope word!", threats: ['border', 'searchlights', 'checkpoint'], hope: ['reunion', 'father', 'free'], question: { text: "Who did Gerta reunite with at the wall?", answer: "father" } },

        const TRANSLATIONS = {
            soldiers: '士兵', wire: '铁丝网', guards: '卫兵', stasi: '秘密警察', patrol: '巡逻队', informants: '线人', watching: '监视', files: '档案',
            escape: '逃脱', free: '自由', hope: '希望', tunnel: '地道', signal: '信号', secret: '秘密', papers: '证件',
            border: '边界', checkpoint: '检查站', searchlights: '探照灯', balloon: '气球', west: '西方', freedom: '自由', passport: '护照',
            hiding: '躲藏', police: '警察', vibration: '震动', garden: '花园', inspection: '检查', smile: '微笑', father: '父亲', boot: '靴子', bucket: '水桶', drill: '钻头',
            midnight: '午夜', radio: '收音机', shadow: '阴影', protest: '抗议', reunion: '团聚', fear: '恐惧', letter: '信件', informant: '线人', interrogation: '审讯'
        };

        // --- HELPERS ---
        function stripPunctuation(word) {
            return word.toLowerCase().replace(/[^a-z]/g, '');
        }

        // --- COMPONENTS ---
        const App = () => {
            const [mode, setMode] = useState(null); // 'junior' | 'senior'
            const [currentStoryIndex, setCurrentStoryIndex] = useState(0);
            const [foundWords, setFoundWords] = useState([]);
            const [isCompleted, setIsCompleted] = useState(false);
            const [showQuestion, setShowQuestion] = useState(false);
            const [answer, setAnswer] = useState('');
            const [isCorrect, setIsCorrect] = useState(null);

            const stories = mode === 'junior' ? JUNIOR_STORIES : SENIOR_STORIES;
            const story = stories[currentStoryIndex];

            const handleWordClick = (word) => {
                if (isCompleted) return;
                const clean = stripPunctuation(word);
                
                let isTarget = false;
                if (mode === 'junior') {
                    isTarget = story.targets.includes(clean);
                } else {
                    isTarget = story.threats.includes(clean) || story.hope.includes(clean);
                }

                if (isTarget && !foundWords.includes(clean)) {
                    const newFound = [...foundWords, clean];
                    setFoundWords(newFound);
                    
                    const totalTargets = mode === 'junior' ? story.targets.length : (story.threats.length + story.hope.length);
                    if (newFound.length === totalTargets) {
                        setIsCompleted(true);
                        confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
                    }
                }
            };

            const nextLevel = () => {
                setCurrentStoryIndex((prev) => (prev + 1) % stories.length);
                setFoundWords([]);
                setIsCompleted(false);
                setShowQuestion(false);
                setAnswer('');
                setIsCorrect(null);
            };

            if (!mode) {
                return (
                    <div className="flex flex-col items-center justify-center min-h-screen p-6">
                        <motion.div initial={{ scale: 0.9, opacity: 0 }} animate={{ scale: 1, opacity: 1 }} className="text-center max-w-md">
                            <h1 className="text-5xl font-bold text-slate-800 mb-4 font-kids">单词小侦探</h1>
                            <p className="text-slate-600 mb-8">选择你的侦探等级，开始搜寻隐藏的线索！</p>
                            <div className="space-y-4">
                                <button onClick={() => setMode('junior')} className="w-full p-6 bg-white border-2 border-blue-200 rounded-2xl shadow-sm hover:shadow-md hover:border-blue-400 transition-all text-left flex items-center gap-4 group">
                                    <span className="text-4xl">🎈</span>
                                    <div>
                                        <div className="font-bold text-xl text-blue-600">初级侦探 (Junior)</div>
                                        <div className="text-slate-500 text-sm">搜寻颜色单词，适合 1-3 年级</div>
                                    </div>
                                    <Lucide.ChevronRight className="ml-auto text-blue-300 group-hover:translate-x-1 transition-transform" />
                                </button>
                                <button onClick={() => setMode('senior')} className="w-full p-6 bg-white border-2 border-rose-200 rounded-2xl shadow-sm hover:shadow-md hover:border-rose-400 transition-all text-left flex items-center gap-4 group">
                                    <span className="text-4xl">🕵️</span>
                                    <div>
                                        <div className="font-bold text-xl text-rose-600">高级侦探 (Senior)</div>
                                        <div className="text-slate-500 text-sm">搜寻历史关键词，适合 4-6 年级</div>
                                    </div>
                                    <Lucide.ChevronRight className="ml-auto text-rose-300 group-hover:translate-x-1 transition-transform" />
                                </button>
                            </div>
                        </motion.div>
                    </div>
                );
            }

            return (
                <div className="max-w-4xl mx-auto p-4 md:p-8">
                    {/* Header */}
                    <header className="flex items-center justify-between mb-8">
                        <button onClick={() => setMode(null)} className="flex items-center gap-2 text-slate-500 hover:text-slate-800 transition-colors">
                            <Lucide.ArrowLeft size={20} /> 返回
                        </button>
                        <div className="flex items-center gap-3">
                            <div className={`px-4 py-1 rounded-full text-xs font-bold uppercase tracking-wider ${mode === 'junior' ? 'bg-blue-100 text-blue-600' : 'bg-rose-100 text-rose-600'}`}>
                                {mode === 'junior' ? 'Junior Mode' : 'Senior Mode'}
                            </div>
                            <div className="text-slate-400 font-mono text-sm">LEVEL {currentStoryIndex + 1}/{stories.length}</div>
                        </div>
                    </header>

                    {/* Main Content */}
                    <main className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                        <div className="lg:col-span-2 space-y-6">
                            <motion.div key={story.id} initial={{ y: 20, opacity: 0 }} animate={{ y: 0, opacity: 1 }} className="bg-white p-8 rounded-3xl shadow-sm border border-slate-100">
                                <div className="flex items-center gap-4 mb-6">
                                    <span className="text-4xl">{story.icon}</span>
                                    <h2 className="text-3xl font-bold text-slate-800 font-kids">{story.title}</h2>
                                </div>
                                <div className="text-xl leading-relaxed text-slate-700 select-none">
                                    {story.text.split(' ').map((word, i) => {
                                        const clean = stripPunctuation(word);
                                        const isFound = foundWords.includes(clean);
                                        const isThreat = mode === 'senior' && story.threats.includes(clean);
                                        const isHope = mode === 'senior' && story.hope.includes(clean);
                                        const isColor = mode === 'junior' && story.targets.includes(clean);
                                        
                                        let highlightClass = "";
                                        if (isFound) {
                                            if (isThreat) highlightClass = "bg-rose-100 text-rose-700 font-bold";
                                            else if (isHope) highlightClass = "bg-emerald-100 text-emerald-700 font-bold";
                                            else if (isColor) highlightClass = "bg-blue-100 text-blue-700 font-bold";
                                        }

                                        return (
                                            <span key={i} className="inline-block mr-1 mb-1">
                                                <span onClick={() => handleWordClick(word)} className={`word-span ${highlightClass}`}>
                                                    {word}
                                                </span>
                                                {isFound && mode === 'senior' && TRANSLATIONS[clean] && (
                                                    <span className="text-[10px] block text-center opacity-70 leading-none -mt-1 font-sans">
                                                        {TRANSLATIONS[clean]}
                                                    </span>
                                                )}
                                            </span>
                                        );
                                    })}
                                </div>
                            </motion.div>

                            {isCompleted && mode === 'senior' && !showQuestion && (
                                <motion.div initial={{ opacity: 0 }} animate={{ opacity: 1 }} className="bg-amber-50 p-6 rounded-2xl border border-amber-200 text-center">
                                    <p className="text-amber-800 font-medium mb-4">你找到了所有线索！现在来回答一个关于故事的问题吧：</p>
                                    <button onClick={() => setShowQuestion(true)} className="px-8 py-3 bg-amber-500 text-white rounded-xl font-bold hover:bg-amber-600 transition-colors">
                                        开始挑战
                                    </button>
                                </motion.div>
                            )}

                            {showQuestion && (
                                <motion.div initial={{ scale: 0.95, opacity: 0 }} animate={{ scale: 1, opacity: 1 }} className="bg-white p-8 rounded-3xl shadow-lg border-2 border-amber-400">
                                    <h3 className="text-xl font-bold mb-4 text-slate-800">{story.question.text}</h3>
                                    <div className="flex gap-2">
                                        <input type="text" value={answer} onChange={(e) => setAnswer(e.target.value)} placeholder="输入你的答案..." className="flex-1 p-4 border-2 border-slate-200 rounded-xl focus:border-amber-400 outline-none transition-all" />
                                        <button onClick={() => {
                                            const correct = answer.toLowerCase().trim() === story.question.answer.toLowerCase();
                                            setIsCorrect(correct);
                                            if (correct) confetti({ particleCount: 100, spread: 50 });
                                        }} className="px-8 bg-slate-800 text-white rounded-xl font-bold hover:bg-slate-900 transition-colors">
                                            提交
                                        </button>
                                    </div>
                                    {isCorrect === true && (
                                        <div className="mt-4 text-emerald-600 font-bold flex items-center gap-2">
                                            <Lucide.CheckCircle2 /> 太棒了！回答正确！
                                        </div>
                                    )}
                                    {isCorrect === false && (
                                        <div className="mt-4 text-rose-600 font-bold flex items-center gap-2">
                                            <Lucide.XCircle /> 哎呀，再试一次吧！
                                        </div>
                                    )}
                                </motion.div>
                            )}
                        </div>

                        {/* Sidebar / Progress */}
                        <div className="space-y-6">
                            <div className="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
                                <h3 className="text-sm font-bold text-slate-400 uppercase tracking-widest mb-4">搜寻清单</h3>
                                <div className="space-y-3">
                                    {mode === 'junior' ? (
                                        story.targets.map(target => (
                                            <div key={target} className={`flex items-center justify-between p-3 rounded-xl border transition-all ${foundWords.includes(target) ? 'bg-blue-50 border-blue-200 text-blue-700' : 'bg-slate-50 border-slate-100 text-slate-400'}`}>
                                                <span className="font-bold capitalize">{target}</span>
                                                {foundWords.includes(target) ? <Lucide.Check size={18} /> : <Lucide.Search size={18} />}
                                            </div>
                                        ))
                                    ) : (
                                        <>
                                            <div className="text-[10px] font-bold text-rose-400 mb-1">威胁 (THREATS)</div>
                                            {story.threats.map(t => (
                                                <div key={t} className={`flex items-center justify-between p-3 rounded-xl border transition-all ${foundWords.includes(t) ? 'bg-rose-50 border-rose-200 text-rose-700' : 'bg-slate-50 border-slate-100 text-slate-400'}`}>
                                                    <span className="font-bold capitalize">{t}</span>
                                                    {foundWords.includes(t) ? <Lucide.Check size={18} /> : <Lucide.ShieldAlert size={18} />}
                                                </div>
                                            ))}
                                            <div className="text-[10px] font-bold text-emerald-400 mt-4 mb-1">希望 (HOPE)</div>
                                            {story.hope.map(h => (
                                                <div key={h} className={`flex items-center justify-between p-3 rounded-xl border transition-all ${foundWords.includes(h) ? 'bg-emerald-50 border-emerald-200 text-emerald-700' : 'bg-slate-50 border-slate-100 text-slate-400'}`}>
                                                    <span className="font-bold capitalize">{h}</span>
                                                    {foundWords.includes(h) ? <Lucide.Check size={18} /> : <Lucide.Heart size={18} />}
                                                </div>
                                            ))}
                                        </>
                                    )}
                                </div>
                            </div>

                            <AnimatePresence>
                                {(isCompleted && (mode === 'junior' || isCorrect)) && (
                                    <motion.button initial={{ y: 20, opacity: 0 }} animate={{ y: 0, opacity: 1 }} exit={{ y: 20, opacity: 0 }} onClick={nextLevel} className="w-full p-6 bg-slate-800 text-white rounded-3xl font-bold text-xl shadow-xl hover:bg-slate-900 hover:scale-[1.02] transition-all flex items-center justify-center gap-3">
                                        下一关 <Lucide.ArrowRight />
                                    </motion.button>
                                )}
                            </AnimatePresence>
                        </div>
                    </main>
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
